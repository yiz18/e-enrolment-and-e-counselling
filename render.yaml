# Render Blueprint — RIASEC Prediction API
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: riasec-prediction-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python run.py
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: CORS_ORIGINS
        value: "*"
